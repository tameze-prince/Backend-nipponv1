# ── Server ────────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL Neon ───────────────────────────────────────────

spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true

# ── SSL requis par Neon/Supabase ────────────────────────────
spring.datasource.hikari.data-source-properties.sslmode=require

# ── JWT ───────────────────────────────────────────────────────────
# Clé générée ci-dessous — copie-colle directement
app.jwt.secret=${JWT_SECRET:dHlCbUUyOUpTV0RKTXpsNGFGQkJiRmRCTUUxRGEwUnZSSGRSYkZseVkyUkE=}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:}

# ── Cloudinary ────────────────────────────────────────────────────
cloudinary.enabled=${CLOUDINARY_ENABLED:true}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ── CORS ──────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:}
app.base-url=${BASE_URL:}

# ── Upload ────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ── Logs ──────────────────────────────────────────────────────────
logging.level.com.otakushop=DEBUG
logging.level.org.springframework.security=WARN

